name: Build and Release DesktopClock

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build archive
        run: |
          xcodebuild \
            -project DesktopClock.xcodeproj \
            -scheme DesktopClock \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/DesktopClock.xcarchive" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            archive

      - name: Export app
        run: |
          EXPORT_DIR="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_DIR"
          cp -R "$RUNNER_TEMP/DesktopClock.xcarchive/Products/Applications/DesktopClock.app" "$EXPORT_DIR/"
          ditto -c -k --sequesterRsrc --keepParent "$EXPORT_DIR/DesktopClock.app" "DesktopClock-macOS.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopClock-macOS
          path: DesktopClock-macOS.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DesktopClock-macOS.zip
